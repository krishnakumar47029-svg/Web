<!DOCTYPE html>
<html lang="en">

  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>Welcome to My Web App</h1>
      <p>Built with Express, HTML, CSS & JavaScript</p>
    </header>

    <main>
      <section class="content">
        <h2>Get Server Data</h2>
        <button id="fetchBtn" class="btn">Fetch Data</button>
        <div id="response" class="response"></div>
      </section>

      <section class="form-section">
        <h2>Send Data</h2>
        <form id="dataForm">
          <input 
            type="text" 
            id="inputField" 
            placeholder="Enter your message" 
            required
          >
          <button type="submit" class="btn">Send</button>
        </form>
        <div id="formResponse" class="response"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Web App. All rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
